apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tripdekho-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/websocket-services: tripdekho-backend
spec:
  tls:
  - hosts:
    - tripdekho.com
    - www.tripdekho.com
    - api.tripdekho.com
    secretName: tripdekho-tls
  rules:
  # Frontend
  - host: tripdekho.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tripdekho-frontend
            port:
              number: 80
  
  - host: www.tripdekho.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tripdekho-frontend
            port:
              number: 80
  
  # Backend API
  - host: api.tripdekho.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tripdekho-backend
            port:
              number: 5000

---
# Certificate Issuer for Let's Encrypt
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@tripdekho.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
    - http01:
        ingress:
          class: nginx
